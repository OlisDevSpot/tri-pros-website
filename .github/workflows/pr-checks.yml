name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Copy CI environment
        run: cp .env.ci .env

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # Real credentials for build-time external calls.
          # Process env overrides .env.ci placeholders (Next.js precedence).
          # Add new secrets here when build-time calls demand them.
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
